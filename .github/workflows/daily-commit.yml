name: Daily Commit

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 24f2006299@ds.study.iitm.ac.in
        run: |
          git config --global user.name "24f2006299"
          git config --global user.email "24f2006299@ds.study.iitm.ac.in"
          echo "Last updated: $(date -u)" > status.txt
          git add status.txt
          git commit -m "Daily auto-commit $(date -u +%Y-%m-%d)"
          git push
